---
name: API CI
on:
  push:
    branches:
      - monitoring-tests

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

jobs:
  integration_tests_api:
    strategy:
      fail-fast: false
      matrix:
        go-version: [ 1.24.x ]
        may-fail: [ false ]

    name: API Integration Tests
    runs-on: ubuntu-latest
    env:
      PERCONA_VERSION_SERVICE_URL: https://check-dev.percona.com/versions/v1
      PMM_HELM_VER: "1.3.21"
    steps:

      - name: Set up Go release
        uses: percona-platform/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set GO_VERSION environment variable
        run: |
          go version
          echo "GO_VERSION=$(go version)" >> $GITHUB_ENV

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Enable Go modules cache
        uses: percona-platform/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ matrix.os }}-go-${{ matrix.go-version }}-modules-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ matrix.os }}-go-${{ matrix.go-version }}-modules-

      - name: Enable Go build cache
        uses: percona-platform/cache@v3
        with:
          path: ~/.cache/go-build
          key: ${{ matrix.os }}-go-${{ matrix.go-version }}-build-${{ github.ref }}-${{ hashFiles('**') }}
          restore-keys: |
            ${{ matrix.os }}-go-${{ matrix.go-version }}-build-${{ github.ref }}-
            ${{ matrix.os }}-go-${{ matrix.go-version }}-build-

      # Switch docker data directory to /mnt to have more space for the local Kubernetes cluster
      - name: Switch docker-daemon data directory to /mnt
        run: |
          sudo systemctl stop docker
          echo '{ "exec-opts": ["native.cgroupdriver=cgroupfs"], "cgroup-parent": "/actions_job", "data-root": "/mnt/docker-data" }' | sudo tee /etc/docker/daemon.json
          sudo mkdir /mnt/docker-data
          sudo systemctl start docker

      - name: Start local Kubernetes cluster with the local registry
        uses: medyagh/setup-minikube@latest
        id: minikube
        with:
          cpus: 2
          memory: 4000m
          addons: registry
          insecure-registry: 'localhost:5000'

      - name: Expose local registry
        run: |
          kubectl port-forward --namespace kube-system service/registry 5000:80 &

      - name: Build Everest API Server
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 make build-debug

      - name: Build Everest CLI
        shell: bash
        run: |
          make build-cli

      - name: Build Everest docker container
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: localhost:5000/perconalab/everest
          tags:
            0.0.0

      - name: Build and Push everest dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # We need to have Everest CRDs available before running provisioning and everest API Server
      # to have an ability to create monitoring configs and use them during the provisioning as
      # a mock pmm server without running a real PMM.
      - name: Install everest operator without Everest
        run: |
          kubectl create ns everest-system
          kubectl create ns everest-monitoring
          curl https://raw.githubusercontent.com/percona/everest-operator/main/deploy/bundle.yaml -o bundle.yaml
          sed -i  "s/namespace: everest-operator-system/namespace: everest-system/g" bundle.yaml
          kubectl -n everest-system apply -f bundle.yaml

      - name: Create a monitoring instance
        run: |
          helm repo add percona https://percona.github.io/percona-helm-charts/
          helm install pmm1 --set secret.pmm_password='admin',service.type=ClusterIP percona/pmm --version $PMM_HELM_VER --timeout 2m
          echo "PMM1_IP=http://$(kubectl get svc/monitoring-service -o json --request-timeout=2m | jq -r '.spec.clusterIP')" >> $GITHUB_ENV
          helm install pmm2 --set secret.pmm_password='admin',service.type=ClusterIP percona/pmm --version $PMM_HELM_VER --timeout 2m -n everest-monitoring
          echo "PMM2_IP=http://$(kubectl get svc/monitoring-service -o json --request-timeout=2m -n everest-monitoring | jq -r '.spec.clusterIP')" >> $GITHUB_ENV
          sleep 60
          echo "PMM1_API_KEY=$(curl --request POST https://admin:admin@${{ env.PMM1_IP }}/graph/api/auth/keys --header 'Content-Type: application/json; charset=utf-8' --data '{"name":"everest-test","role":"Admin"}'  --insecure 2>/dev/null | jq -r '.key')" >> $GITHUB_ENV
          echo "PMM2_API_KEY=$(curl --request POST https://admin:admin@${{ env.PMM2_IP }}/graph/api/auth/keys --header 'Content-Type: application/json; charset=utf-8' --data '{"name":"everest-test","role":"Admin"}'  --insecure 2>/dev/null | jq -r '.key')" >> $GITHUB_ENV
      

      - name: Provision Everest using CLI
        shell: bash
        run: |
          ./bin/everestctl install -v \
            --disable-telemetry \
            --version 0.0.0 \
            --version-metadata-url https://check-dev.percona.com \
            --operator.mongodb=true \
            --operator.postgresql=true \
            --operator.mysql=true \
            --skip-wizard \
            --namespaces everest \
            --helm.set server.image=localhost:5000/perconalab/everest \
            --helm.set server.apiRequestsRateLimit=200 \
            --helm.set versionMetadataURL=https://check-dev.percona.com

      - name: Expose Everest API Server
        run: |
          kubectl port-forward --namespace everest-system deployment/everest-server 8080:8080 &

      - name: Create Everest test users
        run: |
          ./bin/everestctl accounts create -u test -p password
          echo "API_TOKEN_TEST=$(curl --location -s 'localhost:8080/v1/session' --header 'Content-Type: application/json' --data '{"username": "test","password": "password"}' | jq -r .token)" >> $GITHUB_ENV
          ./bin/everestctl accounts create -u everest_ci -p password
          echo "API_TOKEN=$(curl --location -s 'localhost:8080/v1/session' --header 'Content-Type: application/json' --data '{"username": "everest_ci","password": "password"}' | jq -r .token)" >> $GITHUB_ENV

      - name: Add CI user to admin role
        run: |
          kubectl patch configmap everest-rbac -n everest-system --patch "$(kubectl get configmap everest-rbac -n everest-system -o json | jq '.data["policy.csv"] += "\ng, everest_ci, role:admin"' | jq '{data: { "policy.csv": .data["policy.csv"] } }')"
          kubectl get configmap everest-rbac -n everest-system -ojsonpath='{.data.policy\.csv}'

      - name: Init integration tests
        run: |
          cd api-tests
          make init

      - name: Run integration tests
        run: |
          cd api-tests
          make test

      - name: Uninstall PMM
        run: |
          helm uninstall pmm1
          helm uninstall pmm2 -n everest-monitoring

      - name: Run debug commands on failure
        if: ${{ failure() }}
        run: |
          kubectl -n everest-system describe pods
          kubectl -n everest-monitoring describe pods
          kubectl -n everest describe pods
          kubectl -n everest-system logs deploy/everest-server


